<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuestra App de Tareas</title>
    
    <link rel="icon" type="image/webp" href="icon.webp">
    <link rel="apple-touch-icon" href="icon.webp">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { 
            --bg: #f0f2f5; --card: #ffffff; --primary: #6c5ce7; --accent: #00cec9; 
            --text: #2d3436; --danger: #ff7675; --border: #ddd;
        }
        /* Colores de Categorías (Pasteles) */
        .cat-urgente { border-left: 6px solid #fab1a0 !important; }
        .cat-salud { border-left: 6px solid #55efc4 !important; }
        .cat-casa { border-left: 6px solid #74b9ff !important; }
        .cat-general { border-left: 6px solid #dfe6e9 !important; }

        body.dark-mode {
            --bg: #2d3436; --card: #353b48; --text: #f5f6fa; --border: #718093;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: background 0.3s; }
        
        #mascot-container { text-align: center; margin-bottom: 20px; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; position: relative; }
        
        #cat-house { position: relative; width: 100%; height: 200px; display: block; overflow: visible; margin-bottom: 15px; }

        /* Estilo Composite 3D */
        .cat-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .cat-unit { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Z-INDEX PERSPECTIVA INTERNA */
        #cat-fondo  { z-index: 0; }
        #cat-Boti   { z-index: 1; }  #cat-Sammy  { z-index: 2; }  
        #cat-Pelusa { z-index: 10; } #cat-Alfi   { z-index: 11; } 
        #cat-Michi  { z-index: 12; } #cat-Fonchi { z-index: 13; } 

        .hidden { opacity: 0; transform: scale(0.5); pointer-events: none; }

        /* BOCADILLO DE TEXTO */
        #speech-bubble {
            position: absolute; top: 10px; right: 20px; background: white; color: #2d3436;
            padding: 8px 12px; border-radius: 15px; font-size: 12px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 0; transition: opacity 0.5s; z-index: 100;
        }
        #speech-bubble::after { content: ''; position: absolute; bottom: -8px; left: 20px; border-width: 8px 8px 0; border-style: solid; border-color: white transparent; }

        /* RACHAS (GALLETAS) - CORREGIDO PARA MÓVIL */
        #streak-container { 
            position: absolute; 
            top: 10px; 
            left: 20px; 
            display: flex; 
            gap: 5px; 
            z-index: 99; /* FUEZA A ESTAR ARRIBA EN MÓVIL */
        }
        .cookie-icon { width: 25px; height: 25px; }

        #progress-bar { width: 100%; height: 10px; background: #dfe6e9; border-radius: 5px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.5s ease; }

        /* CONTROLES */
        .top-btns { display: flex; justify-content: flex-end; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .btn-mode { background: var(--card); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 20px; color: var(--text); }

        .controls { display: flex; gap: 10px; width: 100%; max-width: 440px; margin-bottom: 15px; }
        .btn-control { flex: 1; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }

        .input-group { background: var(--card); padding: 15px; border-radius: 15px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select, .add-btn { padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; background: var(--card); color: var(--text); }
        .add-btn { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }

        #task-list { width: 100%; max-width: 440px; list-style: none; padding: 0; }
        .task-item { background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .task-item.done { opacity: 0.5; text-decoration: line-through; }
        .task-info { flex-grow: 1; }
        .task-meta { font-size: 10px; color: #636e72; margin-top: 4px; }
        
        .btn-action { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; color: white; font-size: 12px; }
        .btn-edit { background: #fdcb6e; margin-right: 5px; }
        .btn-del { background: var(--danger); }
    </style>
</head>
<body>

    <div class="top-btns">
        <button class="btn-mode" onclick="toggleDarkMode()">🌙</button>
    </div>

    <div id="mascot-container">
        <div id="streak-container"></div>
        <div id="speech-bubble">¡Miau-nífico!</div>
        
        <div id="cat-house">
            <img id="cat-fondo" src="fondo.webp" alt="Fondo" class="cat-img">
            <img id="cat-Pelusa" src="Pelusa.webp" alt="Pelusa" class="cat-img cat-unit hidden">
            <img id="cat-Fonchi" src="Fonchi.webp" alt="Fonchi" class="cat-img cat-unit hidden">
            <img id="cat-Boti"   src="Boti.webp"   alt="Boti"   class="cat-img cat-unit hidden">
            <img id="cat-Sammy"  src="Sammy.webp"  alt="Sammy"  class="cat-img cat-unit hidden">
            <img id="cat-Michi"  src="Michi.webp"  alt="Michi"  class="cat-img cat-unit hidden">
            <img id="cat-Alfi"   src="Alfi.webp"   alt="Alfi"   class="cat-img cat-unit hidden">
        </div>
        <p id="status-text">Cargando familia...</p>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="controls">
        <button class="btn-control" style="background:#a29bfe" onclick="resetDay()">🔄 REINICIAR DÍA</button>
        <button class="btn-control" style="background:#fab1a0" onclick="resetAll()">🗑️ BORRAR TODO</button>
    </div>

    <div class="input-group">
        <input type="text" id="task-input" placeholder="¿Qué haremos hoy?">
        <div style="display:flex; gap:5px;">
            <select id="user-select" style="flex:1;"><option value="Jato">Jato</option><option value="Kathy">Kathy</option><option value="Ambos">Ambos</option></select>
            <select id="cat-select" style="flex:1;"><option value="cat-general">General</option><option value="cat-urgente">Urgente</option><option value="cat-salud">Salud</option><option value="cat-casa">Casa</option></select>
        </div>
        <button class="add-btn" id="add-btn">Añadir Tarea</button>
    </div>

    <ul id="task-list"></ul>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy, writeBatch, getDoc, setDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3MEtx7ocC6orDM0qh3cdgfcgrnVMxyhU",
            authDomain: "app-tareas-jato.firebaseapp.com",
            projectId: "app-tareas-jato",
            storageBucket: "app-tareas-jato.firebasestorage.app",
            messagingSenderId: "488313855493",
            appId: "1:488313855493:web:f99991fae84cf6b969c66c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksCol = collection(db, "tareas");
        const statsDoc = doc(db, "stats", "global");

        let tasks = [];
        let previousCatCount = -1;
        const audioMiau = new Audio('miau.mp3');
        const phrases = ["¡Purr-fecto!", "¡Eres genial!", "¡Miau-nífico!", "¡Ronroneos!", "¡Casi listo!", "¡Equipazo!"];

        // --- MODO OSCURO ---
        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        };
        if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        // --- ESCUCHAR DATOS ---
        onSnapshot(query(tasksCol, orderBy("posicion")), (snap) => {
            tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });

        // --- RACHAS (GALLETAS) ---
        async function updateStreaks(isFull) {
            const snap = await getDoc(statsDoc);
            let data = snap.exists() ? snap.data() : { streak: 0, lastDate: "" };
            const today = new Date().toDateString();
            
            if (isFull && data.lastDate !== today) {
                data.streak++;
                data.lastDate = today;
                await setDoc(statsDoc, data);
            }
            renderCookies(data.streak);
        }

        function renderCookies(count) {
            const container = document.getElementById('streak-container');
            container.innerHTML = '';
            for(let i=0; i<Math.min(count, 5); i++) {
                container.innerHTML += `<img src="galleta.webp" class="cookie-icon" title="Racha: ${count} días">`;
            }
        }
        updateStreaks(false);

        // --- OPERACIONES ---
        document.getElementById('add-btn').onclick = async () => {
            const input = document.getElementById('task-input');
            if (!input.value) return;
            await addDoc(tasksCol, {
                text: input.value, user: document.getElementById('user-select').value,
                category: document.getElementById('cat-select').value,
                done: false, posicion: tasks.length
            });
            input.value = '';
        };

        window.toggleTask = async (id, status) => { await updateDoc(doc(db, "tareas", id), { done: !status }); };
        
        window.editTask = async (id, oldText) => {
            const newText = prompt("Editar tarea:", oldText);
            if (newText) await updateDoc(doc(db, "tareas", id), { text: newText });
        };

        window.deleteTask = async (id) => { await deleteDoc(doc(db, "tareas", id)); };

        window.resetDay = async () => {
            if (!confirm("¿Reiniciar para un nuevo día?")) return;
            const batch = writeBatch(db);
            tasks.forEach(t => batch.update(doc(db, "tareas", t.id), { done: false }));
            await batch.commit();
        };

        window.resetAll = async () => {
            if (!confirm("⚠️ BORRAR TODO?")) return;
            const batch = writeBatch(db);
            tasks.forEach(t => batch.delete(doc(db, "tareas", t.id)));
            await batch.commit();
        };

        function render() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            tasks.forEach(t => {
                const li = document.createElement('li');
                li.className = `task-item ${t.category} ${t.done ? 'done' : ''}`;
                li.innerHTML = `
                    <input type="checkbox" ${t.done ? 'checked' : ''} onclick="toggleTask('${t.id}', ${t.done})">
                    <div class="task-info">
                        <div>${t.text}</div>
                        <div class="task-meta">${t.user}</div>
                    </div>
                    <button class="btn-action btn-edit" onclick="editTask('${t.id}', '${t.text}')">✏️</button>
                    <button class="btn-action btn-del" onclick="deleteTask('${t.id}')">×</button>
                `;
                list.appendChild(li);
            });
            updateMascot();
        }

        function updateMascot() {
            const total = tasks.length;
            const done = tasks.filter(t => t.done).length;
            const percent = total === 0 ? 0 : (done / total) * 100;
            const currentCatCount = Math.floor(percent / 16.6);
            
            if (previousCatCount !== -1 && currentCatCount > previousCatCount) {
                audioMiau.play();
                showBubble();
            }
            previousCatCount = currentCatCount;

            const catNames = ['Pelusa', 'Fonchi', 'Boti', 'Sammy', 'Michi', 'Alfi'];
            catNames.forEach((n, i) => {
                const img = document.getElementById(`cat-${n}`);
                (percent >= (i + 1) * 16.6) ? img.classList.remove('hidden') : img.classList.add('hidden');
            });

            document.getElementById('progress-fill').style.width = percent + "%";
            const status = document.getElementById('status-text');
            
            if (percent === 100 && total > 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                status.innerText = "¡Familia completa! 🎉✨";
                updateStreaks(true);
            } else {
                status.innerText = total === 0 ? "¡Añade una tarea!" : `Michis reunidos: ${currentCatCount} / 6`;
            }
        }

        function showBubble() {
            const b = document.getElementById('speech-bubble');
            b.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            b.style.opacity = 1;
            setTimeout(() => b.style.opacity = 0, 3000);
        }

        Sortable.create(document.getElementById('task-list'), {
            animation: 150, onEnd: async () => {
                const items = document.querySelectorAll('.task-item');
                const batch = writeBatch(db);
                items.forEach((item, index) => {
                    const textContent = item.querySelector('.task-info div').innerText;
                    const t = tasks.find(x => x.text === textContent);
                    if(t) batch.update(doc(db, "tareas", t.id), { posicion: index });
                });
                await batch.commit();
            }
        });
    </script>
</body>
</html>
